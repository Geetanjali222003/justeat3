version: "3.9"

services:

  # ──────────────────────────────────────────────
  # PostgreSQL Database
  # ──────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: justeat-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: justeat2
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - justeat-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d justeat2"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ──────────────────────────────────────────────
  # Redis (OTP storage)
  # ──────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: justeat-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - justeat-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ──────────────────────────────────────────────
  # Spring Boot Backend
  # ──────────────────────────────────────────────
  backend:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    container_name: justeat-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      # Database
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/justeat2
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: root
      SPRING_JPA_HIBERNATE_DDL_AUTO: update

      # Redis
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379

      # Mail (override via .env or environment for production)
      SPRING_MAIL_HOST: smtp.gmail.com
      SPRING_MAIL_PORT: 587
      SPRING_MAIL_USERNAME: ${MAIL_USERNAME:-justeatapp111@gmail.com}
      SPRING_MAIL_PASSWORD: ${MAIL_PASSWORD:-invdyaltbwoyareh}
      SPRING_MAIL_PROPERTIES_MAIL_SMTP_AUTH: "true"
      SPRING_MAIL_PROPERTIES_MAIL_SMTP_STARTTLS_ENABLE: "true"

      # Cloudinary
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME:-dbmwdplfh}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY:-357137314952885}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET:--oo6zEi_WkO31mJnVZWg0AM9GSM}

      # File upload
      SPRING_SERVLET_MULTIPART_MAX_FILE_SIZE: 5MB
      SPRING_SERVLET_MULTIPART_MAX_REQUEST_SIZE: 5MB

      SERVER_PORT: 8090
    ports:
      - "8090:8090"
    networks:
      - justeat-network

  # ──────────────────────────────────────────────
  # React + Vite Frontend (served by Nginx)
  # ──────────────────────────────────────────────
  frontend:
    build:
      context: ./Frontend/JustEat_frontend
      dockerfile: Dockerfile
    container_name: justeat-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"
    networks:
      - justeat-network

# ──────────────────────────────────────────────
# Volumes & Networks
# ──────────────────────────────────────────────
volumes:
  postgres_data:

networks:
  justeat-network:
    driver: bridge

